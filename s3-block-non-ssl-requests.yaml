{
  - Sid       = "AllowSSLRequestsOnly"
  - Acion     = "s3:*"
  - Condition = {
    - Bool = {
      - "aws:SecureTransport" = "false"
    }
  }
  - Effect    = "Deny"
  - Principal = "*"
  - Resource  = [
    - "arn:aws:s3:::<bucketname>",
    - "arn:aws:s3:::<bucketname>/*"
  ]
}

statement {
  sid    = "AllowSSLRequestsOnly"
  effect = "Deny"

  principals {
    type = "*"
    identifiers = ["*"]
  }

  actions = ["s3:*"]

  resources = [
    "${aws_s3_bucket.bucket.arn}",
    "${aws_s3_bucket.bucket.arn}/*"
  ]

  condition {
    test     = "Bool"
    variable = "aws:SecureTransport"
    valuse   = [false]
  }
}
